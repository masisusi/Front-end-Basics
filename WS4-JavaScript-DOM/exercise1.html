<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Introduction</title>
</head>
<body>
    <h1 id="main-title">Welcome to DOM Scripting!</h1>
    <p class="intro-text">This is an introductory paragraph.</p>

    <script>
        const titleElement = document.getElementById('main-title'); //Return one element

        console.log('Title Element:', titleElement.textContent); // Logs text content

        // Access elements by classa name
        const introParagraphs = document.getElementsByClassName('intro-text');
        
        console.log('Intro Paragraphs:', introParagraphs[0].textContent);
    
    </script>
</body>
</html>
