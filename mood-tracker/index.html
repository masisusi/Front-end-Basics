<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood and Activity Tracker</title>
    <link rel="stylesheet" href="style.css"> <!-- Load CSS Style file -->
</head>
<body>
    <main>
        <h1>Mood and Activity Tracker</h1>

        <!--CREATE A NEW ENTRY -->
        <section id="entry-form" class="container"> 
            <h2>How are you feeling?</h2> <!-- Section title -->

            <div id="moodPicker" class="mood-picker" aria-label="Choose a mood"> <!-- Mood buttons container (JS listens here)-->
                <!-- Mood: happy -->
                <button type="button" data-mood="happy" aria-label="Happy">
                    😊
                    <span>Happy</span>
                </button>
                <!-- Mood: good -->
                <button type="button" data-mood="good" aria-label="Good">
                    🙂
                    <span>Good</span>
                </button>
                <!-- Mood: neutral -->
                <button type="button" data-mood="neutral" aria-label="Neutral">
                    😐
                    <span>Neutral</span>
                </button>
                <!-- Mood: sad -->
                <button type="button" data-mood="sad" aria-label="Sad">
                    😔
                    <span>Sad</span>
                </button>
                <!-- Mood: stressed -->
                <button type="button" data-mood="stressed" aria-label="Stressed">
                    😓
                    <span>Stressed</span>
                </button>
            </div>

            <!-- Create entry text -->
            <label for="activities">Activities and highlights (one per line, up to 3 entries):</label>
            <textarea id="activities" rows="3" maxlength="300"
                placeholder="Read a book&#10;Walked the dog&#10;Worked on the project"
                aria-describedby="activities-hint"></textarea>
            <small id="activities-hint" class="char-count"
                ><span id="char-count">0</span>/300</small>
            
            <!-- Submit entry -->
            <button id="save-btn" type="button">Save Entry</button>
        </section>

        <!-- STATISTICS -->
        <section class="container">
            <h2>Your stats</h2>
            <!-- Total entries -->
            <div id="stats"></div> <!-- JS writes statistics here-->
        </section>

        <!-- HISTORY -->
        <section id="history" class="container">
            <h2>History</h2>

            <!-- Filter for the entries-->
            <div id="filter" area-label="Filter entries by mood">
                <button type="button" data-filter="">All</button>
                <button type="button" data-filter="happy">Happy 😊</button>
                <button type="button" data-filter="good">Good 🙂</button>
                <button type="button" data-filter="neutral">Neutral 😐</button>
                <button type="button" data-filter="sad">Sad 😔</button>
                <button type="button" data-filter="stressed">Stressed 😓</button>
            </div>

            <!-- Entry List -->
            <div id="entries-list"></div> <!-- JS writes entry list here-->
        </section>

    </main>
    <script src="script.js"></script>
</body>
</html>
